joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50


front_left_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: base_link_to_front_left_wheel
front_right_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: base_link_to_front_right_wheel
rear_left_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: base_link_to_rear_left_wheel
rear_right_wheel_velocity_controller:
  type: velocity_controllers/JointVelocityController
  joint: base_link_to_rear_right_wheel


gazebo_ros_control:
  pid_gains:
    base_link_to_front_left_wheel: {p: 10.0, i: 0.1, d: 1.0}
    base_link_to_front_right_wheel: {p: 10.0, i: 0.1, d: 1.0}
    base_link_to_rear_left_wheel: {p: 10.0, i: 0.1, d: 1.0}
    base_link_to_rear_right_wheel: {p: 10.0, i: 0.1, d: 1.0}

