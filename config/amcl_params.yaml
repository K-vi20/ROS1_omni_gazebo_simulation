# ═══════════════════════════════════════════════════════════
# AMCL Parameters for Holonomic Robot (Mecanum/Omni)
# ═══════════════════════════════════════════════════════════

# Overall filter parameters
min_particles: 500
max_particles: 2000
kld_err: 0.05
kld_z: 0.99

# Recovery (slow and fast weights)
recovery_alpha_slow: 0.001
recovery_alpha_fast: 0.1

# Initial pose (will be overridden in launch file)
# initial_pose_x: 4.0
# initial_pose_y: 0.0
# initial_pose_a: 0.0

# Update thresholds
update_min_d: 0.2
update_min_a: 0.5

# Resampling
resample_interval: 1
transform_tolerance: 1.0

# GUI
gui_publish_rate: 10.0

# Laser model parameters
laser_max_beams: 60
laser_max_range: 10.0
laser_z_hit: 0.5
laser_z_short: 0.05
laser_z_max: 0.05
laser_z_rand: 0.5
laser_sigma_hit: 0.2
laser_lambda_short: 0.1
laser_likelihood_max_dist: 2.0
laser_model_type: "likelihood_field"

# Odometry model (OMNI for holonomic robot)
odom_model_type: "omni"
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
odom_alpha5: 0.1

# Frame IDs
odom_frame_id: "odom"
base_frame_id: "base_footprint"
global_frame_id: "map"
