DWAPlannerROS:
  # ═══════════════════════════════════════════════════════
  # Robot Configuration (Holonomic)
  # ═══════════════════════════════════════════════════════
  holonomic_robot: true
  
  # Velocity limits (m/s)
  max_vel_x: 0.5           # ไปข้างหน้า
  min_vel_x: -0.3          # ถอยหลัง ✅ (ค่าลบ = ถอยหลัง)
  max_vel_y: 0.5           # สไลด์ซ้าย-ขวา ✅
  min_vel_y: -0.5          # สไลด์ตรงข้าม ✅
  max_vel_theta: 1.0       # หมุน
  min_vel_theta: 0.2
  
  max_trans_vel: 0.5
  min_trans_vel: 0.1
  max_rot_vel: 1.0
  min_rot_vel: 0.2
  
  # Acceleration limits
  acc_lim_x: 1.5
  acc_lim_y: 1.5
  acc_lim_theta: 2.0
  acc_lim_trans: 1.5
  
  # ═══════════════════════════════════════════════════════
  # Goal Tolerance
  # ═══════════════════════════════════════════════════════
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.1
  
  # ═══════════════════════════════════════════════════════
  # Forward Simulation
  # ═══════════════════════════════════════════════════════
  sim_time: 1.7
  vx_samples: 20
  vy_samples: 15           # สำคัญสำหรับ lateral
  vth_samples: 40
  
  # ═══════════════════════════════════════════════════════
  # Scoring
  # ═══════════════════════════════════════════════════════
  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.01
  
  # ═══════════════════════════════════════════════════════
  # Recovery
  # ═══════════════════════════════════════════════════════
  oscillation_reset_dist: 0.05
  prune_plan: true
  restore_defaults: false
